# DigitalOcean App Platform — Worker (long polling). Set secrets in the UI.
# doctl: doctl apps create --spec .do/app.yaml
# SQLite on App Platform is ephemeral (lost on redeploy). Use a Droplet + docker-compose for persistence.

name: cs2-faceit-bot
region: fra

workers:
  - name: bot
    dockerfile_path: Dockerfile
    source_dir: /
    instance_count: 1
    instance_size_slug: basic-xxs
    github:
      repo: bluemadisonblue/CS2DATA
      branch: main
      deploy_on_push: true
    envs:
      - key: BOT_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME_IN_DASHBOARD
      - key: FACEIT_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME_IN_DASHBOARD
      - key: PYTHONUNBUFFERED
        scope: RUN_TIME
        type: GENERAL
        value: "1"
